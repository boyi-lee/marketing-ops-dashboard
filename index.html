<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emers Marketing Ops Dashboard | 營運進度看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* 狀態標籤樣式 */
        .status-badge { @apply px-3 py-1 rounded-full text-xs font-bold inline-block text-center min-w-[90px] shadow-sm; }
        .status-stage1 { @apply bg-orange-100 text-orange-800 border border-orange-200; }
        .status-stage2 { @apply bg-blue-100 text-blue-800 border border-blue-200; }
        .status-stage3 { @apply bg-purple-100 text-purple-800 border border-purple-200; }
        .status-stage4 { @apply bg-yellow-100 text-yellow-800 border border-yellow-200; }
        .status-stage5 { @apply bg-green-100 text-green-800 border border-green-200; }
        .status-error { @apply bg-red-100 text-red-800 border border-red-200; }

        /* 修正備註欄位：完全不截斷文字，自動換行顯示所有細節 */
        .notes-container { 
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.8rem;
            line-height: 1.5;
            color: #475569;
        }

        .drop-zone { border: 2px dashed #94a3b8; transition: all 0.3s ease; }
        .drop-zone.dragover { border-color: #3b82f6; background-color: #eff6ff; }
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col">

    <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <div class="bg-blue-600 text-white rounded-lg p-2 mr-3 flex items-center justify-center">
                        <i class="fas fa-chart-line text-xl"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-800">Emers Marketing Ops</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="sync-status" class="text-xs font-medium text-slate-500 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200">
                        <i class="fas fa-sync fa-spin mr-1 text-blue-400"></i> 同步中...
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-4 sm:p-6 overflow-auto">
        <div class="max-w-7xl mx-auto space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4">
                    <div class="text-slate-400 text-xs font-bold uppercase">待處理</div>
                    <div id="active-count" class="text-2xl font-bold text-slate-800 mt-1">--</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4">
                    <div class="text-slate-400 text-xs font-bold uppercase">財務審核</div>
                    <div id="finance-count" class="text-2xl font-bold text-purple-600 mt-1">--</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4">
                    <div class="text-slate-400 text-xs font-bold uppercase">委刊單處理</div>
                    <div id="io-count" class="text-2xl font-bold text-blue-600 mt-1">--</div>
                </div>
                <div class="bg-green-50 rounded-xl shadow-sm border border-green-100 p-4">
                    <div class="text-green-600 text-xs font-bold uppercase">本月結案</div>
                    <div id="done-count" class="text-2xl font-bold text-green-700 mt-1">--</div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
                    <h2 class="text-sm font-bold text-slate-700 flex items-center">
                        <i class="fas fa-tasks mr-2 text-slate-400"></i> 專案追蹤清單
                    </h2>
                    <button onclick="resetAndOpenModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-all flex items-center">
                        <i class="fas fa-plus mr-2"></i> 新增項目
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200 table-fixed">
                        <thead class="bg-slate-50 text-xs text-slate-500 uppercase font-bold">
                            <tr>
                                <th class="w-28 px-6 py-4 text-left">建立日期</th>
                                <th class="w-32 px-6 py-4 text-left">類型 / 廠商</th>
                                <th class="w-64 px-6 py-4 text-left">標題 / 編號</th>
                                <th class="w-28 px-6 py-4 text-left">金額</th>
                                <th class="w-36 px-6 py-4 text-left">進度</th>
                                <th class="px-6 py-4 text-left">雲端附件與備註細節</th>
                                <th class="w-24 px-6 py-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-slate-100 text-sm" id="table-body">
                            <tr><td colspan="7" class="px-6 py-12 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i> 資料讀取中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="add-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50 px-4">
        <div class="absolute w-full h-full bg-slate-900/60 backdrop-blur-sm" onclick="toggleModal('add-modal')"></div>
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl z-50 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="py-4 px-6 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 id="modal-title" class="text-xl font-bold text-slate-800">管理項目</h2>
                <button type="button" onclick="toggleModal('add-modal')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="ops-form" class="p-6 overflow-y-auto space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">管理類型</label>
                        <select name="type" class="w-full border rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="meta_google">Meta/Google 直投</option>
                            <option value="agency">委外代理商</option>
                            <option value="io">委刊單 (IO)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">編號/項目</label>
                        <input type="text" name="ticketId" class="w-full border rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <input type="number" name="amount" placeholder="金額" class="border rounded-lg p-2 text-sm">
                    <select name="currency" class="border rounded-lg p-2 text-sm"><option value="TWD">TWD</option><option value="USD">USD</option></select>
                    <select name="tax_type" class="border rounded-lg p-2 text-sm"><option value="included">含稅</option><option value="excluded">未稅</option></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">進度更新</label>
                    <select name="status" class="w-full border rounded-lg p-2.5 text-sm font-bold text-slate-700 bg-slate-50">
                        <option value="stage1">1. 收到發票 / 待處理</option>
                        <option value="stage2">2. 助理跑內部流程中</option>
                        <option value="stage3">3. 財務實體審核中</option>
                        <option value="stage4">4. 等待撥款 (遞延期)</option>
                        <option value="stage5">5. 已結案 (請傳附件)</option>
                        <option value="error">⚠️ 異常 / 退件</option>
                    </select>
                </div>
                <div>
                    <div id="drop-zone" class="drop-zone rounded-xl p-8 flex flex-col items-center justify-center bg-slate-50 hover:bg-blue-50 cursor-pointer">
                        <i class="fas fa-cloud-upload-alt text-3xl text-blue-400 mb-2"></i>
                        <p class="text-sm font-medium">拖移檔案上傳，系統將自動依月份歸檔</p>
                    </div>
                    <input type="file" id="file-input" class="hidden">
                    <div id="file-preview" class="hidden mt-2 p-3 bg-blue-50 border border-blue-100 rounded-lg flex justify-between items-center">
                        <span id="file-name" class="text-xs font-bold text-blue-700 truncate"></span>
                        <i class="fas fa-times text-slate-400 cursor-pointer hover:text-red-500" id="remove-file"></i>
                    </div>
                </div>
                <textarea name="notes" rows="3" class="w-full border rounded-lg p-2.5 text-sm" placeholder="備註細節..."></textarea>
                <div class="pt-4 flex justify-end space-x-3 bg-white border-t border-slate-100 mt-4">
                    <button type="button" onclick="toggleModal('add-modal')" class="px-5 py-2 border rounded-lg text-sm font-bold text-slate-500">取消</button>
                    <button type="submit" id="submit-btn" class="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700">儲存變更</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // 核心設定：請確保此網址與您的 GAS 部署網址一致
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyB_SNhjLQLqG2PEVEzBBJqanmL9fk4EOL848Tia6OMHB-r3G5y-IcFnXi8YNgKGp4kTQ/exec";

        window.dashboardData = [];

        const statusMap = {
            'stage1': { text: '1. 待處理', class: 'status-stage1' },
            'stage2': { text: '2. 執行中', class: 'status-stage2' },
            'stage3': { text: '3. 財務審核', class: 'status-stage3' },
            'stage4': { text: '4. 撥款中', class: 'status-stage4' },
            'stage5': { text: '5. 已結案', class: 'status-stage5' },
            'error': { text: '⚠️ 異常', class: 'status-error' }
        };

        const typeMap = { 
            'meta_google': '<div class="flex items-center"><span class="w-2 h-2 rounded-full bg-blue-500 mr-2"></span>直投</div>', 
            'agency': '<div class="flex items-center"><span class="w-2 h-2 rounded-full bg-purple-500 mr-2"></span>代理商</div>', 
            'io': '<div class="flex items-center"><span class="w-2 h-2 rounded-full bg-green-500 mr-2"></span>委刊單</div>' 
        };

        async function fetchDashboardData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                renderTable(data);
                updateStats(data);
                document.getElementById('sync-status').innerHTML = `<i class="fas fa-check-circle mr-1 text-green-500"></i> 最後同步：${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            } catch (err) { 
                document.getElementById('sync-status').innerText = '同步失敗'; 
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            window.dashboardData = [...data].reverse();

            tbody.innerHTML = window.dashboardData.map((row, index) => {
                const statusInfo = statusMap[row.status] || { text: row.status, class: 'bg-slate-100' };
                
                // 智慧附件解析：僅顯示來自 Google Drive 的連結，移除信件連結的呈現
                let attachmentHtml = '';
                if (row.fileUrl && row.fileUrl !== '無附件') {
                    const urls = row.fileUrl.split(' | ');
                    // 過濾出雲端硬碟連結
                    const driveUrls = urls.filter(url => url.includes('drive.google.com'));
                    
                    if (driveUrls.length > 0) {
                        attachmentHtml = driveUrls.map((url, i) => 
                            `<a href="${url}" target="_blank" class="inline-flex items-center px-2 py-1 rounded bg-red-50 text-red-700 text-[10px] font-bold hover:bg-red-100 transition-colors mr-1 mb-1 border border-red-200">
                                <i class="fas fa-file-pdf mr-1"></i> 雲端附件 ${i + 1}
                            </a>`
                        ).join('');
                    } else {
                        attachmentHtml = '<span class="text-slate-300 text-[10px] italic">僅留存於信件 (無雲端檔)</span>';
                    }
                }

                return `
                <tr class="group hover:bg-slate-50/80 transition-colors">
                    <td class="px-6 py-4 text-[11px] text-slate-400 font-medium">${new Date(row.date).toLocaleDateString()}</td>
                    <td class="px-6 py-4 font-semibold text-slate-600">${typeMap[row.type] || row.type}</td>
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${row.ticketId}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5">${row.source || '手動建立'}</div>
                    </td>
                    <td class="px-6 py-4 font-mono text-xs font-bold text-slate-700">${row.amount || '--'}</td>
                    <td class="px-6 py-4"><span class="status-badge ${statusInfo.class}">${statusInfo.text}</span></td>
                    <td class="px-6 py-4">
                        <div class="flex flex-wrap mb-2">${attachmentHtml}</div>
                        <div class="notes-container border-l-2 border-slate-100 pl-3 py-1">
                            ${row.notes || '<span class="text-slate-300 italic">無備註說明</span>'}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="openEditModal(${index})" class="p-2 text-slate-400 hover:text-blue-600 transition-all">
                            <i class="fas fa-edit"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function updateStats(data) {
            document.getElementById('active-count').innerText = data.filter(d => ['stage1', 'stage2'].includes(d.status)).length;
            document.getElementById('finance-count').innerText = data.filter(d => d.status === 'stage3').length;
            document.getElementById('io-count').innerText = data.filter(d => d.type === 'io' && d.status !== 'stage5').length;
            document.getElementById('done-count').innerText = data.filter(d => d.status === 'stage5').length;
        }

        // Modal 與 表單邏輯
        function toggleModal(id) { 
            const modal = document.getElementById(id);
            modal.classList.toggle('opacity-0'); 
            modal.classList.toggle('pointer-events-none'); 
            document.body.classList.toggle('modal-active'); 
        }

        function resetAndOpenModal() { 
            document.getElementById('ops-form').reset(); 
            document.getElementById('modal-title').innerText = '新增項目'; 
            removeFile(); 
            toggleModal('add-modal'); 
        }

        function openEditModal(index) {
            const row = window.dashboardData[index];
            const form = document.getElementById('ops-form');
            form.elements['type'].value = row.type;
            form.elements['status'].value = row.status;
            // 清理系統產生的前綴字
            form.elements['ticketId'].value = (row.ticketId || '').replace('⚠️ 需手動補齊編號: ', '').replace('自動抓取: ', '');
            // 將備註帶入編輯區 (排除自動產生的信件連結部分)
            form.elements['notes'].value = (row.notes || '').split(' | 原始信件：')[0];
            document.getElementById('modal-title').innerText = '更新進度 / 上傳附件';
            toggleModal('add-modal');
        }

        // 檔案處理
        let currentFile = null; let base64String = "";
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { 
            const file = e.target.files[0]; 
            if(file) { 
                currentFile = file; 
                document.getElementById('file-name').innerText = file.name; 
                document.getElementById('file-preview').classList.remove('hidden'); 
                dropZone.classList.add('hidden'); 
                const reader = new FileReader(); 
                reader.onload = (ev) => base64String = ev.target.result; 
                reader.readAsDataURL(file); 
            } 
        };

        function removeFile() { currentFile = null; base64String = ""; document.getElementById('file-preview').classList.add('hidden'); dropZone.classList.remove('hidden'); fileInput.value = ""; }
        document.getElementById('remove-file').onclick = removeFile;

        document.getElementById('ops-form').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = '處理中...';
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            if (currentFile && base64String) { 
                data.fileData = base64String; 
                data.fileName = currentFile.name; 
                data.mimeType = currentFile.type; 
            }
            try {
                await fetch(GAS_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                    body: new URLSearchParams(data).toString() 
                });
                toggleModal('add-modal'); 
                this.reset(); 
                removeFile(); 
                fetchDashboardData(); 
            } catch (err) { alert('儲存失敗'); }
            btn.disabled = false; btn.innerText = '儲存變更';
        };

        window.onload = fetchDashboardData;
        setInterval(fetchDashboardData, 300000); // 5 分鐘自動刷新
    </script>
</body>
</html>
