<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emers Marketing Ops Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .status-badge { @apply px-3 py-1 rounded-full text-xs font-bold inline-block text-center min-w-[100px] shadow-sm cursor-pointer hover:opacity-80 transition-opacity; }
        .status-stage1 { @apply bg-orange-100 text-orange-800 border border-orange-200; }
        .status-stage2 { @apply bg-blue-100 text-blue-800 border border-blue-200; }
        .status-stage3 { @apply bg-purple-100 text-purple-800 border border-purple-200; }
        .status-stage4 { @apply bg-yellow-100 text-yellow-800 border border-yellow-200; }
        .status-stage5 { @apply bg-green-100 text-green-800 border border-green-200; }
        .status-error { @apply bg-red-100 text-red-800 border border-red-200; }
        
        .notes-container { 
            white-space: normal;
            word-break: break-word;
            font-size: 0.8rem;
            line-height: 1.5;
            color: #475569;
        }
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        
        /* 行內編輯樣式 */
        .editable-cell {
            cursor: text;
            position: relative;
            padding: 0.5rem;
            border-radius: 0.375rem;
            transition: all 0.2s;
        }
        .editable-cell:hover {
            background-color: #f1f5f9;
            outline: 2px dashed #cbd5e1;
        }
        .editing {
            background-color: #fff;
            outline: 2px solid #3b82f6;
            padding: 0;
        }
        .edit-input {
            width: 100%;
            border: none;
            outline: none;
            padding: 0.5rem;
            font-size: inherit;
            font-family: inherit;
            background: transparent;
        }
        
        /* 停留天數徽章 */
        .days-badge {
            cursor: pointer;
            transition: all 0.2s;
        }
        .days-badge:hover {
            transform: scale(1.05);
        }
        .days-normal { @apply bg-slate-100 text-slate-600; }
        .days-warning { @apply bg-yellow-100 text-yellow-800 border border-yellow-300; }
        .days-urgent { @apply bg-red-100 text-red-800 border border-red-300 animate-pulse; }
        
        /* 排序箭頭 */
        .sort-header {
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .sort-header:hover {
            background-color: #e2e8f0;
        }
        .sort-icon {
            margin-left: 0.25rem;
            font-size: 0.75rem;
            opacity: 0.4;
        }
        .sort-header.active .sort-icon {
            opacity: 1;
        }
        
        /* 時間軸彈出視窗 */
        .timeline-popup {
            position: absolute;
            z-index: 100;
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 1rem;
            min-width: 300px;
            border: 1px solid #e2e8f0;
        }
        
        .timeline-item {
            position: relative;
            padding-left: 2rem;
            padding-bottom: 1rem;
        }
        .timeline-item:last-child {
            padding-bottom: 0;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0.5rem;
            bottom: -1rem;
            width: 2px;
            background: #e2e8f0;
        }
        .timeline-item:last-child::before {
            display: none;
        }
        .timeline-dot {
            position: absolute;
            left: 0;
            top: 0.375rem;
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.625rem;
        }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col">

    <!-- 導航欄 -->
    <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <div class="bg-blue-600 text-white rounded-lg p-2 mr-3 flex items-center justify-center">
                        <i class="fas fa-chart-line text-xl"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-800">Emers Marketing Ops</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="sync-status" class="text-xs font-medium text-slate-500 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200">
                        <i class="fas fa-sync fa-spin mr-1 text-blue-400"></i> 同步中...
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main class="flex-grow p-4 sm:p-6 overflow-auto">
        <div class="max-w-7xl mx-auto space-y-6">
            
            <!-- 統計卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 cursor-pointer hover:shadow-md transition-shadow" onclick="applyStatusFilter(['stage1', 'stage2'])">
                    <div class="text-slate-400 text-xs font-bold uppercase">待處理</div>
                    <div id="active-count" class="text-2xl font-bold text-slate-800 mt-1">--</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 cursor-pointer hover:shadow-md transition-shadow" onclick="applyStatusFilter(['stage3'])">
                    <div class="text-slate-400 text-xs font-bold uppercase">財務審核</div>
                    <div id="finance-count" class="text-2xl font-bold text-purple-600 mt-1">--</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 cursor-pointer hover:shadow-md transition-shadow" onclick="applyTypeFilter('io')">
                    <div class="text-slate-400 text-xs font-bold uppercase">委刊單處理</div>
                    <div id="io-count" class="text-2xl font-bold text-blue-600 mt-1">--</div>
                </div>
                <div class="bg-green-50 rounded-xl shadow-sm border border-green-100 p-4 cursor-pointer hover:shadow-md transition-shadow" onclick="applyStatusFilter(['stage5'])">
                    <div class="text-green-600 text-xs font-bold uppercase">本月結案</div>
                    <div id="done-count" class="text-2xl font-bold text-green-700 mt-1">--</div>
                </div>
            </div>

            <!-- 篩選與搜尋列 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">
                    <div class="lg:col-span-2">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="search-input" placeholder="搜尋編號、廠商、備註..." 
                                class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                oninput="applyFilters()">
                        </div>
                    </div>
                    <div>
                        <select id="status-filter" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" onchange="applyFilters()">
                            <option value="">所有狀態</option>
                            <option value="stage1">1. 待處理</option>
                            <option value="stage2">2. 執行中</option>
                            <option value="stage3">3. 財務審核</option>
                            <option value="stage4">4. 撥款中</option>
                            <option value="stage5">5. 已結案</option>
                            <option value="error">⚠️ 異常</option>
                        </select>
                    </div>
                    <div>
                        <select id="type-filter" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" onchange="applyFilters()">
                            <option value="">所有類型</option>
                            <option value="meta_google">直投</option>
                            <option value="agency">代理商</option>
                            <option value="io">委刊單</option>
                        </select>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="clearFilters()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                            <i class="fas fa-times mr-1"></i> 清除
                        </button>
                        <button onclick="resetAndOpenModal()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-all">
                            <i class="fas fa-plus mr-1"></i> 新增
                        </button>
                    </div>
                </div>
            </div>

            <!-- 清單表格 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
                    <h2 class="text-sm font-bold text-slate-700 flex items-center">
                        <i class="fas fa-tasks mr-2 text-slate-400"></i> 專案追蹤清單 
                        <span id="result-count" class="ml-2 text-xs font-normal text-slate-500"></span>
                    </h2>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-50 text-xs text-slate-500 uppercase font-bold">
                            <tr>
                                <th class="px-4 py-4 text-left sort-header" onclick="sortTable('date')">
                                    建立日期<i class="fas fa-sort sort-icon"></i>
                                </th>
                                <th class="px-4 py-4 text-left sort-header" onclick="sortTable('type')">
                                    類型 / 廠商<i class="fas fa-sort sort-icon"></i>
                                </th>
                                <th class="px-4 py-4 text-left">標題 / 編號</th>
                                <th class="px-4 py-4 text-left sort-header" onclick="sortTable('amount')">
                                    金額<i class="fas fa-sort sort-icon"></i>
                                </th>
                                <th class="px-4 py-4 text-left">進度</th>
                                <th class="px-4 py-4 text-left sort-header" onclick="sortTable('days')">
                                    停留天數<i class="fas fa-sort sort-icon"></i>
                                </th>
                                <th class="px-4 py-4 text-left">附件與備註</th>
                                <th class="px-4 py-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-slate-100 text-sm" id="table-body">
                            <tr><td colspan="8" class="px-6 py-12 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i> 資料讀取中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal 視窗 -->
    <div id="add-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50 px-4">
        <div class="absolute w-full h-full bg-slate-900/60 backdrop-blur-sm" onclick="toggleModal('add-modal')"></div>
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl z-50 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="py-4 px-6 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 id="modal-title" class="text-xl font-bold text-slate-800">管理項目</h2>
                <button type="button" onclick="toggleModal('add-modal')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="ops-form" class="p-6 overflow-y-auto space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">管理類型</label>
                        <select name="type" class="w-full border rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            <option value="meta_google">Meta/Google 直投</option>
                            <option value="agency">委外代理商</option>
                            <option value="io">委刊單 (IO)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">編號/名稱</label>
                        <input type="text" name="ticketId" class="w-full border rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">金額</label>
                        <input type="number" name="amount" placeholder="金額" class="w-full border rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">幣別</label>
                        <select name="currency" class="w-full border rounded-lg p-2.5 text-sm">
                            <option value="TWD">TWD</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">稅務</label>
                        <select name="tax_type" class="w-full border rounded-lg p-2.5 text-sm">
                            <option value="included">含稅</option>
                            <option value="excluded">未稅</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">進度更新</label>
                    <select name="status" class="w-full border rounded-lg p-2.5 text-sm font-bold text-slate-700 bg-slate-50">
                        <option value="stage1">1. 收到發票 / 待處理</option>
                        <option value="stage2">2. 助理跑內部流程中</option>
                        <option value="stage3">3. 財務實體審核中</option>
                        <option value="stage4">4. 等待撥款 (遞延期)</option>
                        <option value="stage5">5. 已結案 (上傳最終單據)</option>
                        <option value="error">⚠️ 異常 / 退件</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">上傳附件</label>
                    <div id="drop-zone" class="drop-zone rounded-xl p-8 flex flex-col items-center justify-center bg-slate-50 hover:bg-blue-50 transition-colors cursor-pointer">
                        <i class="fas fa-cloud-upload-alt text-3xl text-blue-400 mb-2"></i>
                        <p class="text-sm font-medium text-slate-600 text-center">拖移檔案上傳，系統將自動依月份歸檔</p>
                    </div>
                    <input type="file" id="file-input" class="hidden">
                    <div id="file-preview" class="hidden mt-2 p-3 bg-blue-50 rounded-lg flex justify-between items-center border border-blue-100">
                        <span id="file-name" class="text-xs font-bold text-blue-700 truncate"></span>
                        <i class="fas fa-times text-slate-400 cursor-pointer hover:text-red-500" id="remove-file"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">備註/摘要</label>
                    <textarea name="notes" rows="3" class="w-full border rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="輸入處理細節..."></textarea>
                </div>
                <div class="pt-4 flex justify-end space-x-3 bg-white border-t border-slate-100 mt-4">
                    <button type="button" onclick="toggleModal('add-modal')" class="px-5 py-2 border rounded-lg text-sm font-bold text-slate-500 hover:bg-slate-50">取消</button>
                    <button type="submit" id="submit-btn" class="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-md">儲存變更</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 確認對話框 -->
    <div id="confirm-dialog" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-[60] px-4">
        <div class="absolute w-full h-full bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl z-50 overflow-hidden">
            <div class="p-6">
                <div class="flex items-center mb-4">
                    <div class="bg-blue-100 rounded-full p-3 mr-4">
                        <i class="fas fa-question-circle text-blue-600 text-2xl"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800">確認儲存變更</h3>
                </div>
                <p id="confirm-message" class="text-slate-600 text-sm mb-6">確定要儲存此變更嗎？</p>
                <div class="flex justify-end space-x-3">
                    <button onclick="cancelConfirm()" class="px-5 py-2 border rounded-lg text-sm font-bold text-slate-500 hover:bg-slate-50">取消</button>
                    <button onclick="confirmSave()" class="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-md">確認儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyB_SNhjLQLqG2PEVEzBBJqanmL9fk4EOL848Tia6OMHB-r3G5y-IcFnXi8YNgKGp4kTQ/exec";
        window.dashboardData = [];
        window.filteredData = [];
        window.currentSort = { field: null, order: 'asc' };
        window.pendingEdit = null;

        const statusMap = {
            'stage1': { text: '1. 待處理', class: 'status-stage1' },
            'stage2': { text: '2. 執行中', class: 'status-stage2' },
            'stage3': { text: '3. 財務審核', class: 'status-stage3' },
            'stage4': { text: '4. 撥款中', class: 'status-stage4' },
            'stage5': { text: '5. 已結案', class: 'status-stage5' },
            'error': { text: '⚠️ 異常', class: 'status-error' }
        };

        const typeMap = { 
            'meta_google': '<div class="flex items-center"><span class="w-2 h-2 rounded-full bg-blue-500 mr-2"></span>直投</div>', 
            'agency': '<div class="flex items-center"><span class="w-2 h-2 rounded-full bg-purple-500 mr-2"></span>代理商</div>', 
            'io': '<div class="flex items-center"><span class="w-2 h-2 rounded-full bg-green-500 mr-2"></span>委刊單</div>' 
        };

        // ========== 資料獲取與渲染 ==========
        async function fetchDashboardData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                // 加入停留天數計算
                window.dashboardData = data.map(item => ({
                    ...item,
                    daysElapsed: calculateDaysElapsed(item.date)
                }));
                
                applyFilters();
                document.getElementById('sync-status').innerHTML = `<i class="fas fa-check-circle mr-1 text-green-500"></i> 最後同步：${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            } catch (err) { 
                document.getElementById('sync-status').innerText = '同步失敗'; 
            }
        }

        function calculateDaysElapsed(dateString) {
            const created = new Date(dateString);
            const now = new Date();
            const diff = now - created;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center text-slate-400"><i class="fas fa-inbox mr-2"></i> 沒有符合條件的項目</td></tr>';
                return;
            }

            tbody.innerHTML = data.map((row, index) => {
                const statusInfo = statusMap[row.status] || { text: row.status, class: 'bg-slate-100' };
                const days = row.daysElapsed;
                let daysClass = 'days-normal';
                let daysIcon = '';
                
                if (days >= 14) {
                    daysClass = 'days-urgent';
                    daysIcon = '<i class="fas fa-exclamation-circle mr-1"></i>';
                } else if (days >= 7) {
                    daysClass = 'days-warning';
                    daysIcon = '<i class="fas fa-exclamation-triangle mr-1"></i>';
                }
                
                // 智慧附件解析
                let attachmentHtml = '';
                if (row.fileUrl && row.fileUrl !== '無附件') {
                    const urls = row.fileUrl.split(' | ');
                    attachmentHtml = urls.map((url, i) => {
                        const isDrive = url.includes('drive.google.com');
                        const icon = isDrive ? 'fa-file-pdf text-red-500' : 'fa-envelope text-blue-400';
                        const label = isDrive ? '雲端附件' : '信件連結';
                        const bgColor = isDrive ? 'bg-red-50' : 'bg-blue-50';
                        const textColor = isDrive ? 'text-red-700' : 'text-blue-700';
                        
                        return `
                            <a href="${url}" target="_blank" class="inline-flex items-center px-2 py-1 rounded ${bgColor} ${textColor} text-[10px] font-bold hover:opacity-80 transition-opacity mr-1 mb-1 border border-transparent hover:border-current">
                                <i class="fas ${icon} mr-1"></i> ${label}
                            </a>`;
                    }).join('');
                }

                const originalIndex = window.dashboardData.findIndex(d => d.ticketId === row.ticketId && d.date === row.date);

                return `
                <tr class="group hover:bg-slate-50/80 transition-colors" data-index="${originalIndex}">
                    <td class="px-4 py-4 text-[11px] text-slate-400 font-medium">${new Date(row.date).toLocaleDateString()}</td>
                    <td class="px-4 py-4 font-semibold text-slate-600">${typeMap[row.type] || row.type}</td>
                    <td class="px-4 py-4">
                        <div class="editable-cell font-bold text-slate-800" data-field="ticketId" ondblclick="editCell(this, ${originalIndex})">${row.ticketId}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5">${row.source || '手動建立'}</div>
                    </td>
                    <td class="px-4 py-4">
                        <div class="editable-cell font-mono text-xs font-bold text-slate-700" data-field="amount" ondblclick="editCell(this, ${originalIndex})">${row.amount || '--'}</div>
                    </td>
                    <td class="px-4 py-4">
                        <span class="status-badge ${statusInfo.class}" onclick="editStatus(${originalIndex})">${statusInfo.text}</span>
                    </td>
                    <td class="px-4 py-4">
                        <span class="days-badge ${daysClass} px-3 py-1 rounded-full text-xs font-bold inline-block" onclick="showTimeline(event, ${originalIndex})">
                            ${daysIcon}${days} 天
                        </span>
                    </td>
                    <td class="px-4 py-4">
                        <div class="flex flex-wrap mb-2">${attachmentHtml}</div>
                        <div class="editable-cell notes-container border-l-2 border-slate-100 pl-3 py-1" data-field="notes" ondblclick="editCell(this, ${originalIndex})">${row.notes || '<span class="text-slate-300 italic">雙擊新增備註</span>'}</div>
                    </td>
                    <td class="px-4 py-4 text-right">
                        <button onclick="openEditModal(${originalIndex})" class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all" title="完整編輯">
                            <i class="fas fa-edit"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        // ========== 篩選與搜尋 ==========
        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            const typeFilter = document.getElementById('type-filter').value;

            window.filteredData = window.dashboardData.filter(row => {
                const matchSearch = !searchTerm || 
                    row.ticketId.toLowerCase().includes(searchTerm) ||
                    (row.notes || '').toLowerCase().includes(searchTerm) ||
                    row.type.toLowerCase().includes(searchTerm);
                
                const matchStatus = !statusFilter || row.status === statusFilter;
                const matchType = !typeFilter || row.type === typeFilter;

                return matchSearch && matchStatus && matchType;
            });

            // 應用當前排序
            if (window.currentSort.field) {
                sortData(window.currentSort.field, window.currentSort.order);
            }

            renderTable(window.filteredData);
            updateStats(window.filteredData);
            document.getElementById('result-count').innerText = `(顯示 ${window.filteredData.length} / ${window.dashboardData.length} 項)`;
        }

        function applyStatusFilter(statuses) {
            const select = document.getElementById('status-filter');
            if (statuses.length === 1) {
                select.value = statuses[0];
            } else {
                select.value = '';
            }
            applyFilters();
        }

        function applyTypeFilter(type) {
            document.getElementById('type-filter').value = type;
            applyFilters();
        }

        function clearFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('status-filter').value = '';
            document.getElementById('type-filter').value = '';
            applyFilters();
        }

        function updateStats(data) {
            document.getElementById('active-count').innerText = data.filter(d => ['stage1', 'stage2'].includes(d.status)).length;
            document.getElementById('finance-count').innerText = data.filter(d => d.status === 'stage3').length;
            document.getElementById('io-count').innerText = data.filter(d => d.type === 'io' && d.status !== 'stage5').length;
            document.getElementById('done-count').innerText = data.filter(d => d.status === 'stage5').length;
        }

        // ========== 排序功能 ==========
        function sortTable(field) {
            const headers = document.querySelectorAll('.sort-header');
            const clickedHeader = event.currentTarget;
            
            // 切換排序順序
            if (window.currentSort.field === field) {
                window.currentSort.order = window.currentSort.order === 'asc' ? 'desc' : 'asc';
            } else {
                window.currentSort.field = field;
                window.currentSort.order = 'asc';
            }

            // 更新 UI
            headers.forEach(h => {
                h.classList.remove('active');
                const icon = h.querySelector('.sort-icon');
                icon.className = 'fas fa-sort sort-icon';
            });
            
            clickedHeader.classList.add('active');
            const icon = clickedHeader.querySelector('.sort-icon');
            icon.className = `fas fa-sort-${window.currentSort.order === 'asc' ? 'up' : 'down'} sort-icon`;

            sortData(field, window.currentSort.order);
            renderTable(window.filteredData);
        }

        function sortData(field, order) {
            window.filteredData.sort((a, b) => {
                let valA, valB;
                
                switch(field) {
                    case 'date':
                        valA = new Date(a.date);
                        valB = new Date(b.date);
                        break;
                    case 'amount':
                        valA = parseFloat(a.amount) || 0;
                        valB = parseFloat(b.amount) || 0;
                        break;
                    case 'days':
                        valA = a.daysElapsed;
                        valB = b.daysElapsed;
                        break;
                    case 'type':
                        valA = a.type;
                        valB = b.type;
                        break;
                    default:
                        return 0;
                }

                if (order === 'asc') {
                    return valA > valB ? 1 : -1;
                } else {
                    return valA < valB ? 1 : -1;
                }
            });
        }

        // ========== 行內編輯功能 ==========
        function editCell(cell, index) {
            // 避免重複編輯
            if (cell.classList.contains('editing')) return;
            
            const field = cell.dataset.field;
            const currentValue = field === 'notes' 
                ? (window.dashboardData[index][field] || '')
                : cell.textContent.trim();
            
            cell.classList.add('editing');
            
            const input = field === 'notes' 
                ? document.createElement('textarea')
                : document.createElement('input');
            
            input.className = 'edit-input';
            input.value = currentValue;
            
            if (field === 'notes') {
                input.rows = 3;
                input.style.resize = 'none';
            }
            if (field === 'amount') {
                input.type = 'number';
            }
            
            cell.innerHTML = '';
            cell.appendChild(input);
            input.focus();
            input.select();

            const saveEdit = () => {
                const newValue = input.value.trim();
                if (newValue !== currentValue) {
                    prepareConfirmation({
                        index,
                        field,
                        oldValue: currentValue,
                        newValue,
                        cell
                    });
                } else {
                    cancelEdit(cell, currentValue);
                }
            };

            input.addEventListener('blur', saveEdit);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && field !== 'notes') {
                    e.preventDefault();
                    saveEdit();
                } else if (e.key === 'Escape') {
                    cancelEdit(cell, currentValue);
                }
            });
        }

        function cancelEdit(cell, originalValue) {
            cell.classList.remove('editing');
            cell.innerHTML = originalValue || '<span class="text-slate-300 italic">雙擊新增備註</span>';
        }

        function editStatus(index) {
            const row = window.dashboardData[index];
            const currentStatus = row.status;
            
            const statusOptions = Object.keys(statusMap).map(key => {
                const selected = key === currentStatus ? 'selected' : '';
                return `<option value="${key}" ${selected}>${statusMap[key].text}</option>`;
            }).join('');

            const select = document.createElement('select');
            select.className = 'border rounded px-2 py-1 text-xs font-bold focus:ring-2 focus:ring-blue-500 outline-none';
            select.innerHTML = statusOptions;
            
            const badge = event.target;
            const originalHTML = badge.outerHTML;
            badge.replaceWith(select);
            select.focus();

            const saveStatus = () => {
                const newStatus = select.value;
                if (newStatus !== currentStatus) {
                    prepareConfirmation({
                        index,
                        field: 'status',
                        oldValue: statusMap[currentStatus].text,
                        newValue: statusMap[newStatus].text,
                        newStatusKey: newStatus
                    });
                } else {
                    select.outerHTML = originalHTML;
                }
            };

            select.addEventListener('blur', saveStatus);
            select.addEventListener('change', saveStatus);
        }

        // ========== 確認對話框 ==========
        function prepareConfirmation(editData) {
            window.pendingEdit = editData;
            
            const fieldNames = {
                'ticketId': '編號',
                'amount': '金額',
                'notes': '備註',
                'status': '進度狀態'
            };
            
            const message = `確定要將 <strong>${fieldNames[editData.field]}</strong> 從 "<span class="text-slate-500">${editData.oldValue}</span>" 更改為 "<span class="text-blue-600">${editData.newValue}</span>" 嗎？`;
            document.getElementById('confirm-message').innerHTML = message;
            toggleModal('confirm-dialog');
        }

        async function confirmSave() {
            const edit = window.pendingEdit;
            if (!edit) return;

            toggleModal('confirm-dialog');

            try {
                const updateData = {
                    action: 'update',
                    index: edit.index,
                    field: edit.field,
                    value: edit.field === 'status' ? edit.newStatusKey : edit.newValue
                };

                await fetch(GAS_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                    body: new URLSearchParams(updateData).toString() 
                });

                // 更新本地資料
                window.dashboardData[edit.index][edit.field] = edit.field === 'status' ? edit.newStatusKey : edit.newValue;
                window.dashboardData[edit.index].daysElapsed = calculateDaysElapsed(window.dashboardData[edit.index].date);
                
                applyFilters();
                
                // 顯示成功提示
                showToast('✓ 儲存成功', 'success');
            } catch (err) {
                showToast('✗ 儲存失敗，請重試', 'error');
            }

            window.pendingEdit = null;
        }

        function cancelConfirm() {
            const edit = window.pendingEdit;
            
            if (edit && edit.cell) {
                cancelEdit(edit.cell, edit.oldValue);
            }
            
            toggleModal('confirm-dialog');
            window.pendingEdit = null;
            
            // 重新渲染以恢復狀態選擇器
            if (edit && edit.field === 'status') {
                applyFilters();
            }
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed top-20 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-bold z-[70] transition-all ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // ========== 時間軸彈出視窗 ==========
        function showTimeline(event, index) {
            event.stopPropagation();
            
            // 移除已存在的時間軸
            const existing = document.querySelector('.timeline-popup');
            if (existing) existing.remove();

            const row = window.dashboardData[index];
            const popup = document.createElement('div');
            popup.className = 'timeline-popup';
            
            // 模擬時間軸資料（實際應從後端獲取）
            const timeline = generateTimeline(row);
            
            popup.innerHTML = `
                <div class="flex justify-between items-center mb-4 pb-3 border-b">
                    <h4 class="font-bold text-slate-800 text-sm">進度時間軸</h4>
                    <button onclick="this.closest('.timeline-popup').remove()" class="text-slate-400 hover:text-slate-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="space-y-0">
                    ${timeline.map(item => `
                        <div class="timeline-item">
                            <div class="timeline-dot ${item.color} text-white">
                                <i class="fas ${item.icon}"></i>
                            </div>
                            <div>
                                <div class="text-xs font-bold text-slate-700">${item.stage}</div>
                                <div class="text-[10px] text-slate-400 mt-0.5">${item.date}</div>
                                ${item.duration ? `<div class="text-[10px] text-slate-500 mt-1">停留 ${item.duration} 天</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            const rect = event.target.getBoundingClientRect();
            popup.style.left = `${rect.left}px`;
            popup.style.top = `${rect.bottom + 10}px`;
            
            document.body.appendChild(popup);

            // 點擊外部關閉
            setTimeout(() => {
                document.addEventListener('click', function closeTimeline(e) {
                    if (!popup.contains(e.target)) {
                        popup.remove();
                        document.removeEventListener('click', closeTimeline);
                    }
                });
            }, 100);
        }

        function generateTimeline(row) {
            // 這裡應該從後端獲取完整的狀態變更歷史
            // 目前用模擬資料示意
            const stages = [
                { stage: statusMap['stage1'].text, date: new Date(row.date).toLocaleDateString(), icon: 'fa-file-invoice', color: 'bg-orange-500', duration: null },
                { stage: statusMap[row.status].text, date: '進行中', icon: 'fa-spinner', color: 'bg-blue-500', duration: row.daysElapsed }
            ];
            
            return stages;
        }

        // ========== Modal 與表單邏輯 ==========
        function toggleModal(id) { 
            const modal = document.getElementById(id);
            modal.classList.toggle('opacity-0'); 
            modal.classList.toggle('pointer-events-none'); 
            document.body.classList.toggle('modal-active'); 
        }

        function resetAndOpenModal() { 
            document.getElementById('ops-form').reset(); 
            document.getElementById('modal-title').innerText = '新增管理項目'; 
            removeFile(); 
            toggleModal('add-modal'); 
        }

        function openEditModal(index) {
            const row = window.dashboardData[index];
            const form = document.getElementById('ops-form');
            form.elements['type'].value = row.type;
            form.elements['status'].value = row.status;
            form.elements['ticketId'].value = (row.ticketId || '').replace('⚠️ 需手動補齊編號: ', '').replace('自動抓取: ', '');
            form.elements['notes'].value = row.notes || '';
            form.elements['amount'].value = row.amount || '';
            document.getElementById('modal-title').innerText = '完整編輯項目';
            toggleModal('add-modal');
        }

        // ========== 檔案處理 ==========
        let currentFile = null; 
        let base64String = "";
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        
        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => { 
            const file = e.target.files[0]; 
            if(file) { 
                currentFile = file; 
                document.getElementById('file-name').innerText = file.name; 
                document.getElementById('file-preview').classList.remove('hidden'); 
                dropZone.classList.add('hidden'); 
                const reader = new FileReader(); 
                reader.onload = (ev) => base64String = ev.target.result; 
                reader.readAsDataURL(file); 
            } 
        };

        function removeFile() { 
            currentFile = null; 
            base64String = ""; 
            document.getElementById('file-preview').classList.add('hidden'); 
            dropZone.classList.remove('hidden'); 
            fileInput.value = ""; 
        }
        document.getElementById('remove-file').onclick = removeFile;

        document.getElementById('ops-form').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; 
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 寫入資料庫...';
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            if (currentFile && base64String) { 
                data.fileData = base64String; 
                data.fileName = currentFile.name; 
                data.mimeType = currentFile.type; 
            }
            try {
                await fetch(GAS_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                    body: new URLSearchParams(data).toString() 
                });
                toggleModal('add-modal'); 
                this.reset(); 
                removeFile(); 
                fetchDashboardData(); 
                showToast('✓ 新增成功', 'success');
            } catch (err) { 
                showToast('✗ 儲存失敗，請檢查網路連線', 'error');
            }
            btn.disabled = false; 
            btn.innerText = '儲存變更';
        };

        // ========== 初始化 ==========
        window.onload = fetchDashboardData;
        setInterval(fetchDashboardData, 300000);
    </script>
</body>
</html>
